inherit_from: .rubocop_todo.yml

plugins:
  - rubocop-rails
  - rubocop-rspec
  - rubocop-performance

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.1
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "spec/internal/**/*"
    - "spec/dummy/**/*"
    - "tmp/**/*"
    - "node_modules/**/*"
    - "packages/**/*"
    - "server/**/*"
    - "landing/**/*"
    - "trust-apps/**/*"
    - "gemfiles/**/*"
    - "lib/generators/**/templates/**/*"
    - ".simplecov"

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

Rails/FilePath:
  Enabled: false

Rails/ApplicationController:
  Exclude:
    - "app/controllers/rails_ai_build/**/*"

RSpec/DescribeClass:
  Exclude:
    - "spec/requests/**/*"
    - "spec/integration/**/*"
    - "spec/live/**/*"
    - "spec/rails_ai_build/analytics_integration_spec.rb"
    - "spec/rails_ai_build/errors_spec.rb"
    - "spec/rails_ai_build/tools/edge_cases_spec.rb"
    - "spec/rails_ai_build/engine_load_spec.rb"
    - "spec/lib/tasks/**/*"

Metrics/ClassLength:
  Exclude:
    - "lib/rails_ai_build/trust/app_sandbox.rb"
    - "lib/rails_ai_build/trust/runner.rb"
    - "lib/rails_ai_build/tasks/queue.rb"
    - "lib/rails_ai_build/tasks/runtime.rb"
    - "lib/rails_ai_build/models/anthropic_provider.rb"
    - "lib/rails_ai_build/support.rb"
    - "lib/rails_ai_build/migrations/intelligence.rb"

Metrics/CyclomaticComplexity:
  Exclude:
    - "lib/rails_ai_build/workspace/browser.rb"
    - "lib/rails_ai_build/migrations/intelligence.rb"

Metrics/PerceivedComplexity:
  Exclude:
    - "lib/rails_ai_build/workspace/browser.rb"
    - "lib/rails_ai_build/migrations/intelligence.rb"

Metrics/MethodLength:
  Exclude:
    - "lib/rails_ai_build/migrations/intelligence.rb"

Rails/EnvLocal:
  Exclude:
    - "lib/rails_ai_build/engine.rb"

Style/MultilineBlockChain:
  Exclude:
    - "lib/rails_ai_build/tools/list_models_tool.rb"

RSpec/AnyInstance:
  Exclude:
    - "spec/rails_ai_build/tasks/queue_spec.rb"
    - "spec/rails_ai_build/tasks/runtime_spec.rb"
    - "spec/requests/build_spec.rb"
    - "spec/requests/tasks_spec.rb"

RSpec/SpecFilePathFormat:
  Exclude:
    - "spec/generators/**/*"
    - "spec/live/**/*"

RSpec/DescribeMethod:
  Exclude:
    - "spec/live/**/*"

RSpec/BeforeAfterAll:
  Exclude:
    - "spec/lib/tasks/**/*"

RSpec/MultipleExpectations:
  Max: 5

RSpec/ExampleLength:
  Max: 16

RSpec/NestedGroups:
  Max: 4

RSpec/MessageSpies:
  EnforcedStyle: receive
