inherit_from: .rubocop_todo.yml

plugins:
  - rubocop-rails
  - rubocop-rspec
  - rubocop-performance

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.1
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"
    - "spec/internal/**/*"
    - "spec/dummy/**/*"
    - "tmp/**/*"
    - "node_modules/**/*"
    - "packages/**/*"
    - "server/**/*"
    - "landing/**/*"
    - "gemfiles/**/*"
    - "lib/generators/**/templates/**/*"
    - ".simplecov"

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

Rails/FilePath:
  Enabled: false

Rails/ApplicationController:
  Exclude:
    - "app/controllers/rails_ai_build/**/*"

RSpec/DescribeClass:
  Exclude:
    - "spec/requests/**/*"
    - "spec/integration/**/*"
    - "spec/live/**/*"
    - "spec/rails_ai_build/analytics_integration_spec.rb"
    - "spec/rails_ai_build/errors_spec.rb"
    - "spec/rails_ai_build/tools/edge_cases_spec.rb"
    - "spec/lib/tasks/**/*"

Metrics/ClassLength:
  Exclude:
    - "lib/rails_ai_build/trust/app_sandbox.rb"
    - "lib/rails_ai_build/trust/runner.rb"

RSpec/SpecFilePathFormat:
  Exclude:
    - "spec/generators/**/*"
    - "spec/live/**/*"

RSpec/DescribeMethod:
  Exclude:
    - "spec/live/**/*"

RSpec/BeforeAfterAll:
  Exclude:
    - "spec/lib/tasks/**/*"

RSpec/MultipleExpectations:
  Max: 5

RSpec/ExampleLength:
  Max: 16

RSpec/NestedGroups:
  Max: 4

RSpec/MessageSpies:
  EnforcedStyle: receive
