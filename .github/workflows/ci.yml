name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Run specs
        run: bundle exec rspec

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test Python SDK
        run: |
          pip install -e "packages/python[dev]"
          python3 -m pytest packages/python/tests/ -v

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build JavaScript SDK
        run: |
          cd packages/javascript
          npm ci
          npm run build
