name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rubocop:
    name: RuboCop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: RuboCop
        run: bundle exec rubocop --parallel

  ruby:
    name: Ruby ${{ matrix.ruby }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.1", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Run specs
        run: bundle exec rspec

  db-matrix:
    name: DB ${{ matrix.adapter }} (Ruby 3.3)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        adapter: [sqlite3, postgresql, mysql2]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rails_ai_build_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: rails_ai_build_test
        ports: ["3306:3306"]
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install dependencies (all DB adapters)
        env:
          INSTALL_ALL_DBS: "true"
        run: bundle install

      - name: Run specs (${{ matrix.adapter }})
        env:
          TEST_DB_ADAPTER: ${{ matrix.adapter }}
          TEST_DB_HOST: 127.0.0.1
          TEST_DB_USER: ${{ matrix.adapter == 'postgresql' && 'postgres' || 'root' }}
          TEST_DB_PASSWORD: ${{ matrix.adapter == 'postgresql' && 'postgres' || 'root' }}
          TEST_DB_NAME: rails_ai_build_test
        run: bundle exec rspec

  compatibility-smoke:
    name: Compatibility smoke (5 archetypes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Run compatibility smoke
        run: bundle exec rake rails_ai_build:compatibility:smoke

  coverage-ruby:
    name: Coverage (Ruby)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run specs with coverage
        env:
          COVERAGE: "true"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
        run: bundle exec rspec

      - name: Upload Ruby coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ruby-coverage
          path: |
            coverage/
          retention-days: 14

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/coverage.xml
          flags: ruby
          name: ruby-coverage
          fail_ci_if_error: false

  coverage-python:
    name: Coverage (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test with coverage
        run: |
          pip install -e "packages/python[dev]"
          cd packages/python
          python3 -m pytest tests/ -v \
            --cov=rails_ai_build \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload Python coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: packages/python/coverage.xml
          retention-days: 14

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/python/coverage.xml
          flags: python
          name: python-coverage
          fail_ci_if_error: false

  coverage-report:
    name: PR coverage comment
    runs-on: ubuntu-latest
    needs: [coverage-ruby, coverage-python]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Download Ruby coverage
        uses: actions/download-artifact@v4
        with:
          name: ruby-coverage
          path: coverage

      - name: Download Python coverage
        uses: actions/download-artifact@v4
        with:
          name: python-coverage
          path: packages/python

      - name: Build coverage summary
        id: summary
        run: |
          chmod +x .github/scripts/coverage-pr-comment.sh
          SUMMARY=$(.github/scripts/coverage-pr-comment.sh)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-report
          message: ${{ steps.summary.outputs.body }}

  appraisal:
    name: Appraisal ${{ matrix.rails }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rails: [rails-7-0, rails-7-1, rails-7-2, rails-8-0, rails-8-1]
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install appraisal (${{ matrix.rails }})
        run: |
          bundle install
          bundle exec appraisal ${{ matrix.rails }} install

      - name: Test (${{ matrix.rails }})
        run: bundle exec appraisal ${{ matrix.rails }} rake spec

  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test Python SDK
        run: |
          pip install -e "packages/python[dev]"
          python3 -m pytest packages/python/tests/ -v

  javascript:
    name: JavaScript build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build JavaScript SDK
        run: |
          cd packages/javascript
          npm ci
          npm run build
