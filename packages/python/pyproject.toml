[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rails-ai-build"
version = "0.2.0"
description = "Cursor-like AI coding agents for any Python project"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "Rails AI Build Contributors" }]
keywords = ["ai", "agent", "cursor", "coding", "llm", "openai", "anthropic"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]

[project.scripts]
rails-ai-build = "rails_ai_build.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["rails_ai_build"]

[tool.pytest.ini_options]
testpaths = ["tests"]
