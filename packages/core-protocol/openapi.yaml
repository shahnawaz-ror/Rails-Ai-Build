openapi: 3.1.0
info:
  title: Rails AI Build API
  version: 2.7.0
  description: |
    Language-agnostic REST API for AI coding agents.
    Implemented by the Rails engine, standalone server, or consumed by client SDKs.
    Covers Activation, AI/build/stream/tasks, Host Safety, billing, seats, SSO, and MCP.

servers:
  - url: http://localhost:3000/rails_ai_build
    description: Rails engine (default mount)
  - url: http://localhost:9292
    description: Standalone Rack server

paths:
  /agents:
    get:
      summary: List agents
      responses:
        "200":
          description: Agent list
    post:
      summary: Create agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agent:
                  $ref: "#/components/schemas/AgentInput"
      responses:
        "201":
          description: Created

  /agents/{id}:
    get:
      summary: Get agent
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Agent details

  /agents/{id}/run:
    post:
      summary: Run agent task (async)
      parameters:
        - $ref: "#/components/parameters/AgentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
      responses:
        "202":
          description: Task queued

  /chat:
    post:
      summary: One-shot chat (sync, no persistence)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Agent response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /models/providers:
    get:
      summary: List providers and models
      responses:
        "200":
          description: Provider list

  /settings:
    get:
      summary: Current settings + activation status
      responses:
        "200":
          description: Settings payload (never returns raw API keys)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Settings"
    patch:
      summary: Update non-secret settings
      parameters:
        - $ref: "#/components/parameters/SettingsToken"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                default_provider: { type: string }
                default_model: { type: string }
                diff_preview: { type: boolean }
                audit_enabled: { type: boolean }
                max_agent_iterations: { type: integer }
      responses:
        "200":
          description: Updated settings
        "401":
          description: Settings token required
        "403":
          description: Plan cannot be set via settings

  /settings/keys:
    post:
      summary: Save encrypted API keys (BYOK / cloud)
      parameters:
        - $ref: "#/components/parameters/SettingsToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                openai: { type: string }
                anthropic: { type: string }
                nvidia: { type: string }
                cloud_api_key: { type: string }
                default_provider: { type: string }
      responses:
        "200":
          description: Keys stored; activation status returned

  /settings/license:
    post:
      summary: Activate signed license entitlement
      parameters:
        - $ref: "#/components/parameters/SettingsToken"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [license_key]
              properties:
                license_key: { type: string }
      responses:
        "200":
          description: License applied; plan updated durably
        "422":
          description: Invalid license

  /settings/wizard/complete:
    post:
      summary: Mark first-run wizard complete
      parameters:
        - $ref: "#/components/parameters/SettingsToken"
      responses:
        "200":
          description: Wizard completed

  /settings/bootstrap:
    post:
      summary: Issue settings token once (store as X-Rails-Ai-Build-Token)
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings_token: { type: string }
                  issued: { type: boolean }
        "422":
          description: Token already issued

  /support/doctor:
    get:
      summary: Run diagnostics (keys, encryption, activation, migrations)
      responses:
        "200":
          description: Doctor report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DoctorReport"

  /plans:
    get:
      summary: List plans and current plan
      responses:
        "200":
          description: Plan matrix

  /billing/checkout:
    post:
      summary: Create Stripe checkout session
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                plan: { type: string, enum: [pro, team] }
                email: { type: string }
                success_url: { type: string }
                cancel_url: { type: string }
      responses:
        "200":
          description: Checkout URL
        "422":
          description: Stripe not configured
        "402":
          description: Plan required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanRequired"

  /billing/portal:
    post:
      summary: Create Stripe Billing Portal session
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_id: { type: string }
                return_url: { type: string }
      responses:
        "200":
          description: Portal URL
        "422":
          description: Portal unavailable

  /billing/webhook:
    post:
      summary: Stripe webhook (HMAC signed)
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Event handled
        "400":
          description: Invalid signature

  /audit:
    get:
      summary: Audit log (Team+)
      responses:
        "200":
          description: Logs
        "402":
          description: Plan required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlanRequired"

  /audit/export:
    get:
      summary: Export audit log JSON or CSV (Team+)
      parameters:
        - name: format
          in: query
          schema: { type: string, enum: [json, csv] }
      responses:
        "200":
          description: Export payload
        "402":
          description: Plan required

  /git/status:
    get:
      summary: Git working tree summary (Pro+)
      responses:
        "200":
          description: Branch and changed files

  /mcp/tools:
    get:
      summary: List MCP tools (Pro+)
      responses:
        "200":
          description: Tool list

  /changes:
    get:
      summary: Pending diff changes (Pro+)
      responses:
        "200":
          description: Change list

  /changes/apply_all:
    post:
      summary: Apply all pending changes
      responses:
        "200":
          description: Applied list

  /changes/rollback_session:
    post:
      summary: Undo all file changes for an AI session (Host Safety)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id]
              properties:
                session_id:
                  type: string
      responses:
        "200":
          description: Rollback summary

  /changes/{id}/rollback:
    post:
      summary: Rollback a single tracked change
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rolled back change

  /ai/chat:
    post:
      summary: Model-driven AI chat (session-aware)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Driver result
        "429":
          description: Rate limited
        "503":
          description: Cloud unavailable

  /ai/stream:
    post:
      summary: SSE stream for AI chat
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: text/event-stream

  /stream:
    post:
      summary: Legacy SSE chat stream
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: text/event-stream
        "429":
          description: Rate limited

  /build:
    post:
      summary: Universal builder (verify loop)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [task]
              properties:
                task: { type: string }
                skill: { type: string }
                provider: { type: string }
                model: { type: string }
                verify: { type: boolean }
                max_attempts: { type: integer }
      responses:
        "200":
          description: Build result
        "429":
          description: Rate limited

  /build/stream:
    post:
      summary: SSE universal builder
      responses:
        "200":
          description: text/event-stream

  /tasks:
    get:
      summary: List queued tasks
      responses:
        "200":
          description: Task list
    post:
      summary: Enqueue a multitask job
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [task]
              properties:
                task: { type: string }
                skill: { type: string }
      responses:
        "202":
          description: Accepted
        "429":
          description: Rate limited

  /tasks/{id}/stream:
    post:
      summary: Stream a task
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: text/event-stream

  /skills:
    get:
      summary: List skills
      responses:
        "200":
          description: Skill list

  /skills/run:
    post:
      summary: Run a named skill
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                skill: { type: string }
                message: { type: string }
      responses:
        "200":
          description: Skill result

  /workspace/tree:
    get:
      summary: Workspace file tree
      parameters:
        - name: path
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Tree nodes

  /workspace/file:
    get:
      summary: Read a workspace file
      parameters:
        - name: path
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: File content

  /models/test:
    post:
      summary: Test a provider API key
      responses:
        "200":
          description: Test result

  /pull_requests:
    post:
      summary: Create a GitHub pull request (Team+)
      responses:
        "200":
          description: PR payload
        "402":
          description: Plan required

  /marketplace:
    get:
      summary: Marketplace catalog
      responses:
        "200":
          description: Packs

  /community:
    get:
      summary: Community packs
      responses:
        "200":
          description: Pack list

  /shared_agents:
    get:
      summary: Shared agents (Team+)
      responses:
        "200":
          description: Agents

  /mcp:
    post:
      summary: MCP JSON-RPC handle
      responses:
        "200":
          description: MCP response

  /orchestrate:
    post:
      summary: Multi-agent orchestration
      responses:
        "200":
          description: Orchestration result

  /slack/command:
    post:
      summary: Slack slash command
      responses:
        "200":
          description: Slack payload

  /discord/interactions:
    post:
      summary: Discord interactions endpoint
      responses:
        "200":
          description: Discord payload

  /auth/saml:
    get:
      summary: SAML/SSO config + OmniAuth snippet (Enterprise)
      responses:
        "200":
          description: SAML status
        "402":
          description: Plan required

  /auth/saml/callback:
    post:
      summary: Apply SAML attributes to RBAC role
      responses:
        "200":
          description: Authenticated role mapping

  /seats:
    get:
      summary: Seat claim status (Team license limit)
      responses:
        "200":
          description: Seats status

  /seats/claim:
    post:
      summary: Claim a seat for X-User-Id
      responses:
        "200":
          description: Claimed
        "402":
          description: Seat limit reached

  /analytics:
    get:
      summary: Usage analytics (Team+)
      responses:
        "200":
          description: Analytics

  /help:
    get:
      summary: Help topics
      responses:
        "200":
          description: Topics

  /support/contact:
    get:
      summary: Support contact info
      responses:
        "200":
          description: Contact

components:
  parameters:
    AgentId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    SettingsToken:
      name: X-Rails-Ai-Build-Token
      in: header
      required: false
      schema:
        type: string
      description: Required for settings mutations once bootstrap has issued a token

  schemas:
    AgentInput:
      type: object
      required: [name, provider]
      properties:
        name:
          type: string
        provider:
          type: string
          enum: [openai, anthropic, nvidia, cloud]
        model_name:
          type: string
        system_prompt:
          type: string

    ChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        provider:
          type: string
          default: openai
        model:
          type: string
        system_prompt:
          type: string
        workspace:
          type: string
          description: Absolute path to project root

    ChatResponse:
      type: object
      properties:
        content:
          type: string
        iterations:
          type: integer
        usage:
          type: object
        finish_reason:
          type: string

    Settings:
      type: object
      properties:
        version: { type: string }
        plan: { type: string }
        default_provider: { type: string }
        default_model: { type: string }
        features:
          type: array
          items: { type: string }
        api_keys_configured:
          type: object
          properties:
            openai: { type: boolean }
            anthropic: { type: boolean }
            nvidia: { type: boolean }
            cloud: { type: boolean }
        activation:
          type: object
          properties:
            needs_wizard: { type: boolean }
            activated: { type: boolean }
            entitlement_source: { type: string }
        upgrade_url: { type: string }

    DoctorReport:
      type: object
      properties:
        status: { type: string, enum: [healthy, issues_found] }
        version: { type: string }
        plan: { type: string }
        checks:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              status: { type: string }
              message: { type: string }
              fix: { type: string }

    PlanRequired:
      type: object
      properties:
        error: { type: string }
        code: { type: string, enum: [plan_required] }
        feature: { type: string }
        current_plan: { type: string }
        suggested_plan: { type: string }
        upgrade: { type: string }
        checkout:
          type: object
          properties:
            endpoint: { type: string }
            plan: { type: string }
