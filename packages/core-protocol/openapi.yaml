openapi: 3.1.0
info:
  title: Rails AI Build API
  version: 0.2.0
  description: |
    Language-agnostic REST API for AI coding agents.
    Implemented by the Rails engine, standalone server, or consumed by client SDKs.

servers:
  - url: http://localhost:3000/rails_ai_build
    description: Rails engine (default mount)
  - url: http://localhost:9292
    description: Standalone Rack server

paths:
  /agents:
    get:
      summary: List agents
      responses:
        "200":
          description: Agent list
    post:
      summary: Create agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agent:
                  $ref: "#/components/schemas/AgentInput"
      responses:
        "201":
          description: Created

  /agents/{id}:
    get:
      summary: Get agent
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Agent details

  /agents/{id}/run:
    post:
      summary: Run agent task (async)
      parameters:
        - $ref: "#/components/parameters/AgentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
      responses:
        "202":
          description: Task queued

  /chat:
    post:
      summary: One-shot chat (sync, no persistence)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Agent response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /models/providers:
    get:
      summary: List providers and models
      responses:
        "200":
          description: Provider list

components:
  parameters:
    AgentId:
      name: id
      in: path
      required: true
      schema:
        type: integer

  schemas:
    AgentInput:
      type: object
      required: [name, provider]
      properties:
        name:
          type: string
        provider:
          type: string
          enum: [openai, anthropic]
        model_name:
          type: string
        system_prompt:
          type: string

    ChatRequest:
      type: object
      required: [message]
      properties:
        message:
          type: string
        provider:
          type: string
          default: openai
        model:
          type: string
        system_prompt:
          type: string
        workspace:
          type: string
          description: Absolute path to project root

    ChatResponse:
      type: object
      properties:
        content:
          type: string
        iterations:
          type: integer
        usage:
          type: object
        finish_reason:
          type: string
